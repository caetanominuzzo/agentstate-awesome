id: clickup-integration
name: ClickUp Integration
description: >
  CLI tool for managing ClickUp teams, spaces, and tasks.
  Gives agents direct access to your ClickUp workspace via the REST API.
category: integrations
subcategory: project-management

files:
  - src: clickup_cli.py
    dest: scripts/integrations/clickup/clickup_cli.py
  - src: AGENTS.md
    dest: scripts/integrations/clickup/AGENTS.md

python_dependencies:
  - "requests>=2.31.0"

env_vars:
  - name: CLICKUP_API_TOKEN
    description: "ClickUp personal API token"
    required: true

tags:
  - clickup
  - project-management
  - tasks
  - productivity

tech_tags:
  - python

compatible_agents:
  - any

depends_on: []
featured: false

source:
  type: original
