id: elasticsearch-integration
name: Elasticsearch Integration
description: >
  CLI tool for searching, indexing, and managing Elasticsearch indices and documents.
  Gives agents direct access to your Elasticsearch cluster via the Python SDK.
category: integrations
subcategory: databases

files:
  - src: elasticsearch_cli.py
    dest: scripts/integrations/elasticsearch/elasticsearch_cli.py
  - src: AGENTS.md
    dest: scripts/integrations/elasticsearch/AGENTS.md

python_dependencies:
  - "elasticsearch>=8.10.0"

env_vars:
  - name: ELASTICSEARCH_URL
    description: "Elasticsearch cluster URL (e.g., https://localhost:9200)"
    required: true
  - name: ELASTICSEARCH_API_KEY
    description: "Elasticsearch API key for authentication"
    required: false

tags:
  - elasticsearch
  - databases
  - search
  - full-text-search

tech_tags:
  - python

compatible_agents:
  - any

depends_on: []
featured: false

source:
  type: original
