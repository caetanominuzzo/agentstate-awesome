id: redis-cli-integration
name: Redis CLI Integration
description: >
  CLI tool for interacting with Redis key-value store.
  Gives agents direct access to your Redis instance via the Python SDK.
category: integrations
subcategory: databases

files:
  - src: redis_cli_tool.py
    dest: scripts/integrations/redis-cli/redis_cli_tool.py
  - src: AGENTS.md
    dest: scripts/integrations/redis-cli/AGENTS.md

python_dependencies:
  - "redis>=5.0.0"

env_vars:
  - name: REDIS_URL
    description: "Redis connection URL (e.g., redis://user:pass@host:6379/0)"
    required: true

tags:
  - redis
  - databases
  - cache
  - key-value

tech_tags:
  - python

compatible_agents:
  - any

depends_on: []
featured: false

source:
  type: original
