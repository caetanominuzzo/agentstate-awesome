id: hubspot-integration
name: HubSpot Integration
description: >
  CLI tool for managing HubSpot contacts and deals.
  Gives agents direct access to your HubSpot CRM via the REST API.
category: integrations
subcategory: crm-support

files:
  - src: hubspot_cli.py
    dest: scripts/integrations/hubspot/hubspot_cli.py
  - src: AGENTS.md
    dest: scripts/integrations/hubspot/AGENTS.md

python_dependencies:
  - "requests>=2.31.0"

env_vars:
  - name: HUBSPOT_ACCESS_TOKEN
    description: "HubSpot private app access token"
    required: true

tags:
  - hubspot
  - crm
  - contacts
  - deals

tech_tags:
  - python

compatible_agents:
  - any

depends_on: []
featured: false

source:
  type: original
