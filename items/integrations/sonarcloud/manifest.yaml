id: sonarcloud-integration
name: SonarCloud Integration
description: >
  CLI tool for listing projects, retrieving code quality measures, and searching issues in SonarCloud.
  Gives agents direct access to your SonarCloud data via the REST API.
category: integrations
subcategory: security

files:
  - src: sonarcloud_cli.py
    dest: scripts/integrations/sonarcloud/sonarcloud_cli.py
  - src: AGENTS.md
    dest: scripts/integrations/sonarcloud/AGENTS.md

python_dependencies:
  - "requests>=2.31.0"

env_vars:
  - name: SONAR_TOKEN
    description: "SonarCloud authentication token"
    required: true
  - name: SONAR_ORG
    description: "SonarCloud organization key"
    required: true

tags:
  - sonarcloud
  - code-quality
  - security
  - static-analysis

tech_tags:
  - python

compatible_agents:
  - any

depends_on: []
featured: false

source:
  type: original
