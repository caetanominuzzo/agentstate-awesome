id: mailgun-integration
name: Mailgun Integration
description: >
  CLI tool for sending emails and listing events via Mailgun.
  Gives agents direct access to your Mailgun domain via the REST API.
category: integrations
subcategory: email

files:
  - src: mailgun_cli.py
    dest: scripts/integrations/mailgun/mailgun_cli.py
  - src: AGENTS.md
    dest: scripts/integrations/mailgun/AGENTS.md

python_dependencies:
  - "requests>=2.31.0"

env_vars:
  - name: MAILGUN_API_KEY
    description: "Mailgun API key"
    required: true
  - name: MAILGUN_DOMAIN
    description: "Mailgun sending domain (e.g., mg.example.com)"
    required: true

tags:
  - mailgun
  - email
  - notifications
  - transactional-email

tech_tags:
  - python

compatible_agents:
  - any

depends_on: []
featured: false

source:
  type: original
