id: mongodb-cli-integration
name: MongoDB CLI Integration
description: >
  CLI tool for querying and managing MongoDB databases and collections.
  Gives agents direct access to your MongoDB instance via pymongo.
category: integrations
subcategory: databases

files:
  - src: mongodb_cli.py
    dest: scripts/integrations/mongodb-cli/mongodb_cli.py
  - src: AGENTS.md
    dest: scripts/integrations/mongodb-cli/AGENTS.md

python_dependencies:
  - "pymongo>=4.5.0"

env_vars:
  - name: MONGODB_URI
    description: "MongoDB connection URI (e.g., mongodb://user:pass@host:27017)"
    required: true

tags:
  - mongodb
  - databases
  - nosql
  - document-store

tech_tags:
  - python

compatible_agents:
  - any

depends_on: []
featured: false

source:
  type: original
