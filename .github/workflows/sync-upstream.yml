name: Sync upstream skills

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Sync skills from upstream repos
        run: python scripts/sync-upstream.py

      - name: Rebuild collection index
        run: python scripts/build-index.py

      - name: Create PR if changes
        uses: peter-evans/create-pull-request@v5
        with:
          title: 'chore: sync upstream skills'
          body: 'Automated weekly sync of mirrored skills from upstream repositories.'
          branch: sync/upstream-skills
          commit-message: 'chore: sync upstream skills'
          delete-branch: true
